<svg width="1100" height="550" viewBox="0 0 1100 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Estilos y Animaciones CSS integradas -->
    <style>
      /* 1. Movimiento y clics del cursor */
      @keyframes cursorAnim {
        0%, 5% { transform: translate(500px, 600px); }
        15%, 19% { transform: translate(450px, 250px); } /* Hover Node */
        17% { transform: translate(450px, 250px) scale(0.85); } /* Click Node */
        30%, 34% { transform: translate(1040px, 30px); } /* Hover Btn ON */
        32% { transform: translate(1040px, 30px) scale(0.85); } /* Click Btn ON */
        70%, 74% { transform: translate(1040px, 30px); } /* Hover Btn OFF */
        72% { transform: translate(1040px, 30px) scale(0.85); } /* Click Btn OFF */
        85%, 100% { transform: translate(1200px, 600px); } /* Leave */
      }
      .cursor { animation: cursorAnim 10s infinite cubic-bezier(0.4, 0, 0.2, 1); }

      /* 2. Nodo Seleccionado (Anillo azul) */
      @keyframes selectNode {
        0%, 16% { stroke: #475569; stroke-width: 2; }
        17%, 100% { stroke: #3b82f6; stroke-width: 3; }
      }
      .target-node { animation: selectNode 10s infinite; }

      /* 3. Botón Focus Mode (Ojo) */
      @keyframes btnToggle {
        0%, 31% { fill: #1e293b; stroke: #475569; }
        32%, 71% { fill: #2563eb; stroke: #60a5fa; }
        72%, 100% { fill: #1e293b; stroke: #475569; }
      }
      @keyframes btnIcon {
        0%, 31% { stroke: #94a3b8; }
        32%, 71% { stroke: #ffffff; }
        72%, 100% { stroke: #94a3b8; }
      }
      .btn-bg { animation: btnToggle 10s infinite; }
      .btn-icon { animation: btnIcon 10s infinite; }

      /* 4. Opacar elementos no conectados */
      @keyframes fadeOut {
        0%, 31% { opacity: 1; filter: grayscale(0); }
        35%, 71% { opacity: 0.15; filter: grayscale(100%); }
        75%, 100% { opacity: 1; filter: grayscale(0); }
      }
      .fade-target { animation: fadeOut 10s infinite ease-in-out; }

      /* 5. Resaltar elementos conectados (Glow in) */
      @keyframes fadeInGlow {
        0%, 31% { opacity: 0; }
        35%, 71% { opacity: 1; }
        75%, 100% { opacity: 0; }
      }
      .glow-target { animation: fadeInGlow 10s infinite ease-in-out; }
    </style>

    <!-- Background Grid Pattern -->
    <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#334155" />
    </pattern>

    <!-- Arrow Markers -->
    <marker id="arrow-normal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <marker id="arrow-glow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
    </marker>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo Global -->
  <rect width="100%" height="100%" fill="#020617" />
  <rect width="100%" height="100%" fill="url(#dotGrid)" />

  <!-- Header Abstracto Falso -->
  <rect width="100%" height="60" fill="#0f172a" fill-opacity="0.8" />
  <line x1="0" y1="60" x2="1100" y2="60" stroke="#1e293b" stroke-width="2" />

  <!-- Botón Ojo (Focus Mode) Abstracto -->
  <g transform="translate(1020, 10)">
    <rect class="btn-bg" width="40" height="40" rx="8" stroke-width="1.5" />
    <svg x="8" y="8" width="24" height="24" viewBox="0 0 24 24">
      <path class="btn-icon" d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle class="btn-icon" cx="12" cy="12" r="3" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </g>

  <!-- ================= CAPA DE TRANSICIONES (BASE) ================= -->
  <g id="edges-base">
    <!-- E1: idle -> processing -->
    <path d="M 200 250 C 280 250, 280 250, 360 250" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow-normal)" />
    <!-- E2: processing -> success -->
    <path d="M 520 250 C 580 250, 590 125, 660 125" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow-normal)" />
    <!-- E3: processing -> error -->
    <path d="M 520 250 C 580 250, 590 395, 660 395" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow-normal)" />
    <!-- E4: error -> archived (FADE TARGET) -->
    <g class="fade-target">
      <path d="M 800 395 C 840 395, 850 395, 890 395" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow-normal)" />
    </g>
  </g>

  <!-- ================= CAPA DE TRANSICIONES (GLOW) ================= -->
  <g class="glow-target">
    <!-- E1 Highlight -->
    <path d="M 200 250 C 280 250, 280 250, 360 250" fill="none" stroke="#3b82f6" stroke-width="3" filter="url(#neonGlow)" marker-end="url(#arrow-glow)" />
    <!-- E2 Highlight -->
    <path d="M 520 250 C 580 250, 590 125, 660 125" fill="none" stroke="#3b82f6" stroke-width="3" filter="url(#neonGlow)" marker-end="url(#arrow-glow)" />
    <!-- E3 Highlight -->
    <path d="M 520 250 C 580 250, 590 395, 660 395" fill="none" stroke="#3b82f6" stroke-width="3" filter="url(#neonGlow)" marker-end="url(#arrow-glow)" />
  </g>

  <!-- ================= ETIQUETAS DE EVENTO (SKELETONS BASE) ================= -->
  <g id="badges-base">
    <g transform="translate(250, 240)">
      <rect width="60" height="20" rx="10" fill="#1e293b" stroke="#475569" />
      <rect x="15" y="8" width="30" height="4" rx="2" fill="#64748b" />
    </g>
    <g transform="translate(560, 150)">
      <rect width="60" height="20" rx="10" fill="#1e293b" stroke="#475569" />
      <rect x="12" y="8" width="36" height="4" rx="2" fill="#64748b" />
    </g>
    <g transform="translate(560, 335)">
      <rect width="60" height="20" rx="10" fill="#1e293b" stroke="#475569" />
      <rect x="14" y="8" width="32" height="4" rx="2" fill="#64748b" />
    </g>
    <g class="fade-target" transform="translate(815, 385)">
      <rect width="60" height="20" rx="10" fill="#1e293b" stroke="#475569" />
      <rect x="18" y="8" width="24" height="4" rx="2" fill="#64748b" />
    </g>
  </g>

  <!-- ================= ETIQUETAS DE EVENTO (SKELETONS GLOW) ================= -->
  <g class="glow-target">
    <g transform="translate(250, 240)">
      <rect width="60" height="20" rx="10" fill="#1e3a8a" stroke="#3b82f6" filter="url(#neonGlow)" />
      <rect x="15" y="8" width="30" height="4" rx="2" fill="#93c5fd" />
    </g>
    <g transform="translate(560, 150)">
      <rect width="60" height="20" rx="10" fill="#1e3a8a" stroke="#3b82f6" filter="url(#neonGlow)" />
      <rect x="12" y="8" width="36" height="4" rx="2" fill="#93c5fd" />
    </g>
    <g transform="translate(560, 335)">
      <rect width="60" height="20" rx="10" fill="#1e3a8a" stroke="#3b82f6" filter="url(#neonGlow)" />
      <rect x="14" y="8" width="32" height="4" rx="2" fill="#93c5fd" />
    </g>
  </g>

  <!-- ================= NODOS (SKELETONS) ================= -->

  <!-- N1: idle shape -->
  <g transform="translate(60, 225)">
    <rect width="140" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
    <circle cx="25" cy="25" r="7" fill="none" stroke="#4ade80" stroke-width="3"/>
    <!-- Pseudo-text -->
    <rect x="45" y="22" width="40" height="6" rx="3" fill="#94a3b8" />
  </g>

  <!-- N2: processing shape (EL NODO SELECCIONADO) -->
  <g transform="translate(360, 225)">
    <!-- Animación de borde azul brillante para el nodo activo -->
    <rect class="target-node" width="160" height="50" rx="8" fill="#1e293b" />
    <path d="M 20 20 L 30 25 L 20 30 Z" fill="none" stroke="#facc15" stroke-width="2"/>
    <path d="M 15 25 L 35 25" stroke="#facc15" stroke-width="2"/>
    <!-- Pseudo-text -->
    <rect x="45" y="22" width="70" height="6" rx="3" fill="#94a3b8" />
  </g>

  <!-- N3: success shape -->
  <g transform="translate(660, 100)">
    <rect width="140" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
    <circle cx="25" cy="25" r="7" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <path d="M 21 25 L 24 28 L 29 21" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <!-- Pseudo-text -->
    <rect x="45" y="22" width="55" height="6" rx="3" fill="#94a3b8" />
  </g>

  <!-- N4: error shape -->
  <g transform="translate(660, 370)">
    <rect width="140" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
    <circle cx="25" cy="25" r="7" fill="none" stroke="#f87171" stroke-width="2"/>
    <line x1="25" y1="21" x2="25" y2="26" stroke="#f87171" stroke-width="2"/>
    <circle cx="25" cy="29" r="1" fill="#f87171"/>
    <!-- Pseudo-text -->
    <rect x="45" y="22" width="35" height="6" rx="3" fill="#94a3b8" />
  </g>

  <!-- N5: archived shape (FADE TARGET) -->
  <g class="fade-target" transform="translate(890, 370)">
    <rect width="140" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
    <circle cx="25" cy="25" r="7" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <!-- Pseudo-text -->
    <rect x="45" y="22" width="60" height="6" rx="3" fill="#94a3b8" />
  </g>

  <!-- ================= CURSOR FALSO ================= -->
  <!-- Simula la interacción del usuario -->
  <g class="cursor">
    <path d="M0,0 L15,10 L8,12 L12,20 L8,22 L4,14 L0,18 Z" fill="#ffffff" stroke="#000000" stroke-width="1.5" />
    <circle cx="0" cy="0" r="20" fill="#3b82f6" fill-opacity="0.3" opacity="0">
      <animate attributeName="opacity" values="0; 1; 0" keyTimes="0; 0.5; 1" dur="0.5s" begin="1.6s" repeatCount="indefinite" />
    </circle>
  </g>

</svg>